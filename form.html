<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="./index.html">Tech Community</a>
        <div class="navbar-nav">
            <a class="nav-link" href="./index.html">Home</a>
            <a class="nav-link active" href="./form.html">Join Us</a>
            <a class="nav-link" href="./gallery.html">Multimedia</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Form Pendaftaran Anggota</h4>
                </div>
                <div class="card-body">
                    <form id="registrationForm">
                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" id="nameInput" class="form-control" required placeholder="Masukkan nama">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="emailInput" class="form-control" required placeholder="contoh@mail.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bidang Minat</label>
                            <select id="interestInput" class="form-select" required>
                                <option value="" selected disabled>Pilih bidang...</option>
                                <option value="Web Development">Web Development</option>
                                <option value="Cyber Security">Cyber Security</option>
                                <option value="Artificial Intelligence">Artificial Intelligence</option>
                                <option value="Mobile Development">Mobile Development</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Daftar Sekarang</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="./index.html" class="text-decoration-none">← Kembali ke Beranda</a>
                    </div>
                </div>
            </div>

            <div id="resultArea" class="mt-4 d-none">
                <div class="alert alert-info">
                    <h5>Hasil Input Terakhir:</h5>
                    <p id="resultContent"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const tempDatabase = [];

    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const data = {
            nama: document.getElementById('nameInput').value,
            email: document.getElementById('emailInput').value,
            minat: document.getElementById('interestInput').value
        };

        // Simpan ke Array (Simulasi Database)
        tempDatabase.push(data);
        console.log("Database Sementara:", tempDatabase);

        // Tampilkan Alert
        alert(`Terima kasih ${data.nama}! Data berhasil diterima.`);

        // Tampilkan di bawah form
        document.getElementById('resultArea').classList.remove('d-none');
        document.getElementById('resultContent').innerHTML = 
            `<strong>Nama:</strong> ${data.nama}<br>
             <strong>Email:</strong> ${data.email}<br>
             <strong>Minat:</strong> ${data.minat}`;
        
        // Reset Form
        this.reset();
    });
</script>

</body>
</html>
