<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Tech Community</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Home</a>
                <a class="nav-link" href="form.html">Join Us</a>
                <a class="nav-link" href="gallery.html">Gallery</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1>Welcome to Tech Community</h1>
            <p class="lead">A community dedicated to fostering innovation and collaboration in technology. Join us to connect with like-minded individuals, share knowledge, and build amazing projects together.</p>
        </div>

        <h2>Members</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Interest</th>
                </tr>
            </thead>
            <tbody id="membersTable">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load members from localStorage
        function loadMembers() {
            const members = JSON.parse(localStorage.getItem('members')) || [];
            const tableBody = document.getElementById('membersTable');
            tableBody.innerHTML = '';
            members.forEach(member => {
                const row = `<tr>
                    <td>${member.name}</td>
                    <td>${member.email}</td>
                    <td>${member.interest}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }
        loadMembers();
    </script>
</body>
</html>
