<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Community | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero-section { background: #212529; color: white; padding: 60px 0; }
        .navbar-brand { font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="./index.html">Tech Community</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="./index.html">Home</a>
            <a class="nav-link" href="./form.html">Join Us</a>
            <a class="nav-link" href="./gallery.html">Multimedia</a>
        </div>
    </div>
</nav>



<header class="hero-section text-center">
    <div class="container">
        <h1>Welcome to Tech Community</h1>
        <p class="lead">Website ini merupakan tempat Mahasiswa untuk belajar bagaimana kolaborasi di dunia teknologi dan pengetahuan.</p>
    </div>
</header>

<main class="container my-5">
    <h2 class="mb-4 text-center">Daftar Anggota Komunitas</h2>
    <div class="table-responsive bg-white p-4 shadow-sm rounded">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Nama</th>
                    <th>Email</th>
                    <th>Bidang Minat</th>
                </tr>
            </thead>
            <tbody id="memberTableBody">
                </tbody>
        </table>
    </div>
</main>

<script>
    // Simulasi data sementara menggunakan Array
    const members = [
        { nama: "Wildhan Valerian", email: "wildhan@tech.com", minat: "Cyber Security" },
        { nama: "Tejo Cahyo", email: "tejo@tech.com", minat: "Full Stack Development" },
        { nama: "Budi Santoso", email: "budi@tech.com", minat: "Data Science" }
    ];

    const tableBody = document.getElementById('memberTableBody');
    members.forEach(member => {
        let row = `<tr>
            <td>${member.nama}</td>
            <td>${member.email}</td>
            <td>${member.minat}</td>
        </tr>`;
        tableBody.innerHTML += row;
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
